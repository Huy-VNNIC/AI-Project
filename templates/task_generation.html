<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task & Test Generation - Neumorphism Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light Mode - Neumorphism Color Tokens */
            --primary: #006666;
            --secondary: #F1F2F5;
            --surface: #E7E5E4;
            --success: #00A63D;
            --warning: #FE9900;
            --danger: #FF2157;
            --text: #1E2938;
            --text-light: #6B7280;
            
            /* Shadow System */
            --shadow-light: rgba(255, 255, 255, 0.8);
            --shadow-dark: rgba(0, 0, 0, 0.15);
            --shadow-extruded: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            --shadow-inset: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            --shadow-hover: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
            --bg-gradient: linear-gradient(135deg, #E7E5E4 0%, #D9D7D3 100%);
        }

        html[data-theme="dark"] {
            /* Dark Mode Colors */
            --primary: #00D9D9;
            --secondary: #2A3F4B;
            --surface: #1F3A42;
            --success: #34D399;
            --warning: #FCD34D;
            --danger: #FF6B9D;
            --text: #F3F4F6;
            --text-light: #D1D5DB;
            
            /* Dark Mode Shadows */
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.4);
            --shadow-extruded: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            --shadow-inset: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            --shadow-hover: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
            --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1F3A42 100%);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            font-family: 'Space Mono', monospace;
            color: var(--text);
            padding: 24px 16px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            background: var(--surface);
            border-radius: 16px;
            padding: 32px 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-extruded);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title h1 {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            letter-spacing: 0.5px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--surface);
            box-shadow: var(--shadow-extruded);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 24px;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            background: var(--secondary);
            padding: 8px;
            border-radius: 12px;
            box-shadow: var(--shadow-inset);
        }

        .dark-mode-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: var(--surface);
            color: var(--primary);
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow-extruded);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark-mode-btn:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .dark-mode-btn:active {
            box-shadow: var(--shadow-inset);
            transform: translateY(1px);
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            background: var(--surface);
            color: var(--text);
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-extruded);
            font-size: 13px;
        }

        .mode-btn:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-inset);
        }

        .mode-btn.active:hover {
            box-shadow: var(--shadow-inset);
            transform: translateY(1px);
        }

        /* Main Content Grid */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 32px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Card Sections */
        .card-section {
            background: var(--surface);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-extruded);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-section:hover {
            box-shadow: var(--shadow-hover);
        }

        .card-section h2 {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .card-section h2 i {
            font-size: 22px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group textarea,
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            background: var(--surface);
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text);
            box-shadow: var(--shadow-inset);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            resize: vertical;
        }

        .form-group textarea {
            min-height: 150px;
            line-height: 1.6;
        }

        .form-group input[type="number"] {
            font-variant-numeric: tabular-nums;
        }

        .form-group textarea:focus,
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            box-shadow: var(--shadow-inset), 0 0 0 3px rgba(0, 102, 102, 0.2);
            background: var(--secondary);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-light);
            opacity: 0.7;
        }

        /* Form Row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 768px) {
            .form-row-3 {
                grid-template-columns: 1fr;
            }
        }

        /* Buttons */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Space Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-extruded);
        }

        .btn-primary:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            box-shadow: var(--shadow-inset);
            transform: translateY(1px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            box-shadow: var(--shadow-extruded);
        }

        .btn-secondary:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-extruded);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .stat-card.primary {
            background: linear-gradient(135deg, var(--primary) 0%, #004d4d 100%);
            color: white;
        }

        .stat-card.success {
            background: linear-gradient(135deg, var(--success) 0%, #007e2d 100%);
            color: white;
        }

        .stat-card.warning {
            background: linear-gradient(135deg, var(--warning) 0%, #cc7a00 100%);
            color: white;
        }

        .stat-card.danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc1a42 100%);
            color: white;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        /* Test Cases */
        .test-case-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-extruded);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .test-case-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateX(4px);
        }

        .test-case-item.critical {
            border-left-color: var(--danger);
        }

        .test-case-item.high {
            border-left-color: var(--warning);
        }

        .test-case-item.medium {
            border-left-color: var(--primary);
        }

        .test-case-item.low {
            border-left-color: var(--success);
        }

        .test-case-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .test-id {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--primary);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .badge-primary {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow-inset);
        }

        .badge-success {
            background: rgba(0, 166, 61, 0.15);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(254, 153, 0, 0.15);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(255, 33, 87, 0.15);
            color: var(--danger);
        }

        .test-description {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .test-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 12px;
        }

        .metric {
            background: var(--secondary);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: var(--shadow-inset);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-label {
            color: var(--text-light);
            font-weight: 600;
            font-size: 11px;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 700;
            font-size: 12px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            background: var(--surface);
            color: var(--text);
            border: none;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-extruded);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        .filter-tab:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-inset);
        }

        /* Output Section */
        .output-section {
            max-height: calc(100vh - 300px);
            overflow-y: auto;
            padding-right: 12px;
        }

        .output-section::-webkit-scrollbar {
            width: 8px;
        }

        .output-section::-webkit-scrollbar-track {
            background: var(--secondary);
            border-radius: 4px;
        }

        .output-section::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Loading States */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 48px 20px;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--secondary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Alerts */
        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-extruded);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: var(--surface);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert-error {
            background: var(--surface);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .alert-info {
            background: var(--surface);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        /* Help text */
        .help-text {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-light);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 24px;
            }

            .card-section {
                padding: 24px;
            }

            .form-row-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <div class="header-icon">
                    <i class="bi bi-cpu"></i>
                </div>
                <h1>Task & Test Generation</h1>
            </div>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="switchMode('requirements')">
                    <i class="bi bi-file-text"></i> Requirements
                </button>
                <button class="mode-btn" onclick="switchMode('model')">
                    <i class="bi bi-gear"></i> Model Mode
                </button>
                <button class="dark-mode-btn" onclick="toggleDarkMode()" title="Toggle dark mode">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel -->
            <div class="card-section">
                <h2><i class="bi bi-pencil-square"></i> Requirements Input</h2>

                <div class="form-group">
                    <label>Requirements Document</label>
                    <textarea id="requirementsInput" placeholder="Enter requirements (one per line)...">The system shall allow users to login with email and password.
The application must prevent SQL injection attacks.
Users should be able to reset their password via email link.
The system should support two-factor authentication.
The platform must encrypt all sensitive user data at rest.</textarea>
                    <div class="help-text">
                        <i class="bi bi-info-circle"></i>
                        Each line = one requirement
                    </div>
                </div>

                <div class="form-row-3">
                    <div class="form-group">
                        <label>Max Test Cases</label>
                        <input type="number" id="maxTests" value="50" min="1" max="200">
                    </div>
                    <div class="form-group">
                        <label>Confidence</label>
                        <input type="number" id="threshold" value="0.5" min="0" max="1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Priority Level</label>
                        <select id="priority">
                            <option value="all">All Levels</option>
                            <option value="critical">Critical</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="generateTestCases()">
                    <i class="bi bi-lightning-fill"></i> Generate Cases
                </button>
            </div>

            <!-- Right Panel -->
            <div class="card-section">
                <h2><i class="bi bi-beaker"></i> Generated Test Cases</h2>

                <div id="alertContainer"></div>

                <div id="statsContainer" style="display: none;">
                    <div class="stats-bar" id="statsBar"></div>
                </div>

                <div id="filterContainer" style="display: none;">
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterTests('all')">
                            All <span id="countAll">(0)</span>
                        </button>
                        <button class="filter-tab" onclick="filterTests('security')">
                            🔒 Security <span id="countSecurity">(0)</span>
                        </button>
                        <button class="filter-tab" onclick="filterTests('performance')">
                            ⚡ Performance <span id="countPerformance">(0)</span>
                        </button>
                        <button class="filter-tab" onclick="filterTests('functional')">
                            ✓ Functional <span id="countFunctional">(0)</span>
                        </button>
                    </div>
                </div>

                <div id="testCasesContainer" class="output-section">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="bi bi-inbox"></i></div>
                        <p>Enter requirements to generate test cases</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTestCases = [];
        let currentFilter = 'all';

        async function generateTestCases() {
            const requirements = document.getElementById('requirementsInput').value.trim();
            const maxTests = parseInt(document.getElementById('maxTests').value);
            const threshold = parseFloat(document.getElementById('threshold').value);
            const priority = document.getElementById('priority').value;

            if (!requirements) {
                showAlert('Please enter at least one requirement', 'error');
                return;
            }

            const container = document.getElementById('testCasesContainer');
            container.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <span>Generating test cases...</span>
                </div>
            `;

            try {
                const response = await fetch('/api/v2/test-generation/generate-test-cases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requirements: requirements,
                        max_tests: maxTests,
                        threshold: threshold
                    })
                });

                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

                const data = await response.json();
                allTestCases = data.test_cases || [];

                if (allTestCases.length === 0) {
                    showAlert('No test cases generated. Try adjusting your requirements.', 'error');
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="bi bi-exclamation-circle"></i></div>
                            <p>No test cases generated</p>
                        </div>
                    `;
                    return;
                }

                displayTestCases(allTestCases);
                displayStats(allTestCases);
                showAlert(`✓ Generated ${allTestCases.length} test cases`, 'success');

            } catch (error) {
                console.error('Error:', error);
                showAlert(`Error: ${error.message}`, 'error');
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="bi bi-exclamation-triangle"></i></div>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function displayTestCases(testCases) {
            const container = document.getElementById('testCasesContainer');
            const filtered = testCases.filter(tc => {
                if (currentFilter === 'all') return true;
                return tc.category === currentFilter;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="bi bi-filter"></i></div>
                        <p>No test cases match selected filter</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(tc => `
                <div class="test-case-item ${tc.category} ${getSeverityClass(tc.severity)}">
                    <div class="test-case-header">
                        <div>
                            <span class="test-id">${tc.test_id}</span>
                            <div style="margin-top: 8px;">
                                <span class="badge badge-primary">${tc.category}</span>
                                <span class="badge ${getSeverityBadgeClass(tc.severity)}">${tc.severity}</span>
                            </div>
                        </div>
                    </div>
                    <div class="test-description">${tc.description}</div>
                    <div class="test-metrics">
                        <div class="metric">
                            <span class="metric-label">Effort</span>
                            <span class="metric-value">${tc.estimated_effort_hours.toFixed(1)}h</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Confidence</span>
                            <span class="metric-value">${(tc.confidence * 100).toFixed(0)}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Automation</span>
                            <span class="metric-value">${(tc.automation_feasibility * 100).toFixed(0)}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Coverage</span>
                            <span class="metric-value">High</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('filterContainer').style.display = 'block';
            document.getElementById('statsContainer').style.display = 'block';
        }

        function displayStats(testCases) {
            const stats = {
                total: testCases.length,
                security: testCases.filter(tc => tc.category === 'security').length,
                performance: testCases.filter(tc => tc.category === 'performance').length,
                functional: testCases.filter(tc => tc.category === 'functional').length,
                avgEffort: (testCases.reduce((sum, tc) => sum + tc.estimated_effort_hours, 0) / testCases.length).toFixed(1),
                avgConfidence: (testCases.reduce((sum, tc) => sum + tc.confidence, 0) / testCases.length * 100).toFixed(0)
            };

            document.getElementById('countAll').textContent = `(${stats.total})`;
            document.getElementById('countSecurity').textContent = `(${stats.security})`;
            document.getElementById('countPerformance').textContent = `(${stats.performance})`;
            document.getElementById('countFunctional').textContent = `(${stats.functional})`;

            const statsBar = document.getElementById('statsBar');
            statsBar.innerHTML = `
                <div class="stat-card primary">
                    <div class="stat-value">${stats.total}</div>
                    <div class="stat-label">Total Tests</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-value">${stats.security}</div>
                    <div class="stat-label">Security</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value">${stats.avgEffort}h</div>
                    <div class="stat-label">Avg Effort</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value">${stats.avgConfidence}%</div>
                    <div class="stat-label">Confidence</div>
                </div>
            `;
        }

        function filterTests(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.filter-tab').classList.add('active');
            displayTestCases(allTestCases);
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <i class="bi bi-${type === 'success' ? 'check-circle-fill' : 'exclamation-circle-fill'}"></i>
                <span>${message}</span>
            `;
            container.innerHTML = '';
            container.appendChild(alert);

            if (type === 'success') {
                setTimeout(() => alert.remove(), 3000);
            }
        }

        function getSeverityClass(severity) {
            const map = { 'CRITICAL': 'critical', 'HIGH': 'high', 'MEDIUM': 'medium', 'LOW': 'low' };
            return map[severity] || 'low';
        }

        function getSeverityBadgeClass(severity) {
            const map = {
                'CRITICAL': 'badge-danger',
                'HIGH': 'badge-warning',
                'MEDIUM': 'badge-primary',
                'LOW': 'badge-success'
            };
            return map[severity] || 'badge-primary';
        }

        function switchMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.mode-btn').classList.add('active');
        }

        // Dark Mode Toggle
        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme-task-gen', isDark ? 'light' : 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const isDark = html.getAttribute('data-theme') === 'dark';
            icon.className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme-task-gen') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon();
        }

        // Initialize theme on page load
        document.addEventListener('DOMContentLoaded', initTheme);
    </script>
</body>
</html>
